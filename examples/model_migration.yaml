# examples/model_migration.yaml
#
# Demonstrates the model-migration regression workflow:
#
#   1. Run this spec with your current model (model A):
#        falsifyai run examples/model_migration.yaml
#      Note the session id printed at the end.
#
#   2. Switch model providers / versions and run again:
#        falsifyai run examples/model_migration.yaml
#
#   3. Diff the two sessions:
#        falsifyai diff <session_A_id> <session_B_id>
#
#   The diff command exits 5 (REGRESSION) if any case's verdict regressed
#   (STABLE -> FRAGILE, STABLE -> CONSISTENTLY_WRONG, or FRAGILE ->
#   CONSISTENTLY_WRONG). This is the Phase 0 launch wedge.
#
# Four cases cover different reliability contracts:
#
#   factual_recall      simple sanity anchor (known fact)
#   structured_output   must return a specific JSON shape
#   extraction          must extract specific values from input
#   policy_summary      grounded summarization (must preserve required terms)
#
# The mix is intentional: one obvious sanity case + three production-shaped
# contracts. A migration regression then looks like a behavioral pattern
# ("structured output and extraction broke; factual recall and policy
# grounding held") rather than a single anecdotal failure.

falsify:
  version: "1.0"
  name: "Model migration regression test"

model:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 256

run:
  seed: 42

cases:
  - id: factual_recall
    tags: ["factual", "migration"]
    input:
      text: "What is the capital of France?"
    expected:
      contains: ["Paris"]
    perturbations:
      - type: typo_noise
        count: 3
      - type: casing
    invariants:
      - type: contains
        values: ["Paris"]

  - id: structured_output
    tags: ["structured", "migration"]
    input:
      text: 'Reply ONLY with a JSON object of the form {"capital": "<city>"}. What is the capital of Japan?'
    expected:
      contains: ['"capital"', "Tokyo"]
    perturbations:
      - type: typo_noise
        count: 2
      - type: casing
    invariants:
      - type: contains
        values: ['"capital"', "Tokyo"]

  - id: extraction
    tags: ["extraction", "migration"]
    input:
      text: "Extract only the email addresses from this text: Contact alice@example.com or bob@example.com for details. The deadline is Friday."
    expected:
      contains: ["alice@example.com", "bob@example.com"]
    perturbations:
      - type: typo_noise
        count: 2
      - type: casing
    invariants:
      - type: contains
        values: ["alice@example.com", "bob@example.com"]

  - id: policy_summary
    tags: ["policy", "summary", "migration"]
    input:
      text: "Summarize this refund policy in one sentence: Customers can request a refund within 30 days if the item is unused and the receipt is provided."
    expected:
      contains: ["30 days", "unused", "receipt"]
    perturbations:
      - type: typo_noise
        count: 2
      - type: casing
    invariants:
      - type: contains
        values: ["30 days", "unused", "receipt"]
