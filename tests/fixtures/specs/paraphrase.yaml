# Fixture for ParaphrasePerturbationSpec parsing tests.
# Exercises both the minimal form (defaults) and the explicit-override form.

falsify:
  version: "1.0"
  name: "paraphrase fixture"

model:
  provider: groq
  model: llama-3.1-8b-instant
  temperature: 0.0
  max_tokens: 256

run:
  seed: 42

cases:
  - id: defaults
    input:
      text: "What is the capital of France?"
    expected:
      contains: ["Paris"]
    perturbations:
      - type: paraphrase
    invariants:
      - type: contains
        values: ["Paris"]

  - id: explicit_override
    input:
      text: "What is the capital of Japan?"
    expected:
      contains: ["Tokyo"]
    perturbations:
      - type: paraphrase
        count: 5
        similarity_threshold: 0.9
        max_attempts: 5
        model:
          provider: groq
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max_tokens: 128
    invariants:
      - type: contains
        values: ["Tokyo"]
